# O Netlify não tem Flutter instalado por padrão: o comando de build baixa
# o SDK (canal stable) antes de compilar a versão web.
[build]
  publish = "build/web"
  command = "git clone https://github.com/flutter/flutter.git --depth 1 -b stable _flutter && export PATH=\"$PATH:$(pwd)/_flutter/bin\" && flutter pub get && flutter build web --release"

# Headers para o WebAssembly do Pyodide carregar corretamente.
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
